name: Hotspot Sync

on:
  schedule:
    - cron: "*/30 * * * *" # UTC 기준 30분마다
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests beautifulsoup4 sqlalchemy lxml

      - name: Run collector once
        env:
          SEOUL_API_KEY: ${{ secrets.SEOUL_API_KEY }}
        run: |
          python -m 4_streamlit.seed.seoul_collector_30min --once

      - name: Commit DB changes (if any)
        run: |
          if git status --porcelain 4_streamlit/crime_db.db | grep -q "^[ MARC]"; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add 4_streamlit/crime_db.db
            git commit -m "chore: update hotspot db"
            git push
          else
            echo "No DB changes to commit."
          fi
